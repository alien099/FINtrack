meta:
  environment: python
  toolchain:
    name: pip
    version: 3.12

build:
  requirementsPath: requirements.txt

run:
  scriptName: sh -c "cd backend && python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
  containerPort: 8000